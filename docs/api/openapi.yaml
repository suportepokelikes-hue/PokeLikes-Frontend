openapi: 3.1.0
info:
  title: Likes Uai Platform Backend API
  version: 1.0.0-draft
  summary: Draft contract for Likes Uai Platform Backend V1
  description: |
    Draft OpenAPI contract for the public and admin APIs of Likes Uai Platform Backend V1.
    This file is intentionally incomplete and must evolve with implementation.
servers:
  - url: http://localhost:3001/v1
    description: Local development
tags:
  - name: Auth
  - name: Users
  - name: Wallet
  - name: Payments
  - name: Referrals
  - name: Affiliates
  - name: Catalog
  - name: Supplier
  - name: Orders
  - name: Dashboard
  - name: Alerts
  - name: Audits
  - name: Health
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Session revoked
  /auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /auth/email-verification/request:
    post:
      tags: [Auth]
      summary: Request email verification token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Email verification request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /auth/email-verification/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Current user summary after email confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /catalog/services:
    get:
      tags: [Catalog]
      summary: Catalog service list
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: socialNetwork
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated catalog service list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCatalogServicesResponse'
  /catalog/services/{serviceId}:
    get:
      tags: [Catalog]
      summary: Catalog service detail
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Catalog service detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogServiceResource'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /me:
    get:
      tags: [Users]
      summary: Current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
    patch:
      tags: [Users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
  /me/wallet:
    get:
      tags: [Wallet]
      summary: Wallet summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletSummary'
  /me/wallet/transactions:
    get:
      tags: [Wallet]
      summary: Wallet transactions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated wallet transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWalletTransactionsResponse'
  /me/payments/pix:
    post:
      tags: [Payments]
      summary: Create PIX payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePixPaymentRequest'
      responses:
        '201':
          description: PIX charge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResource'
  /me/payments:
    get:
      tags: [Payments]
      summary: Payment list for current user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentsResponse'
  /me/payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Payment detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResource'
  /me/referral:
    get:
      tags: [Referrals]
      summary: Current referral summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral summary for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /me/affiliate/apply:
    post:
      tags: [Affiliates]
      summary: Apply for affiliate profile
      description: |
        Creates the authenticated user's `AffiliateProfile` when it does not exist.
        If the user already has a profile, the current profile is returned unchanged.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Affiliate profile created or returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateProfileResource'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /me/affiliate:
    get:
      tags: [Affiliates]
      summary: Current user's affiliate profile
      description: |
        Returns the authenticated user's `AffiliateProfile`.
        When the user has not applied yet, the response is `null`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Affiliate profile or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AffiliateProfileResource'
                  - type: 'null'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /me/affiliate/summary:
    get:
      tags: [Affiliates]
      summary: Current affiliate dashboard summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Affiliate summary for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateSummaryResource'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /me/affiliate/commissions:
    get:
      tags: [Affiliates]
      summary: Current affiliate commissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortOrder'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, paid]
      responses:
        '200':
          description: Paginated affiliate commission list for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAffiliateCommissionsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /webhooks/payments/{provider}:
    post:
      tags: [Payments]
      summary: Payment webhook receiver
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: webhookSecret
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAckResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /me/orders:
    post:
      tags: [Orders]
      summary: Create order
      description: |
        Creates an order for the authenticated user using wallet balance.
        `affiliateCode` is optional. If the informed code is invalid, checkout continues without
        affiliate attribution and the order is not blocked.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
    get:
      tags: [Orders]
      summary: Current user orders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrdersResponse'
  /me/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Current user order detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResource'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /admin/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Admin dashboard summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummaryResponse'
  /admin/users:
    get:
      tags: [Users]
      summary: Admin user list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
    post:
      tags: [Users]
      summary: Admin create user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
  /admin/users/{userId}:
    get:
      tags: [Users]
      summary: Admin user detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Users]
      summary: Admin update user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
  /admin/catalog/services:
    get:
      tags: [Catalog]
      summary: Admin catalog service list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: socialNetwork
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated catalog service list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminCatalogServicesResponse'
    post:
      tags: [Catalog]
      summary: Admin create catalog service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCatalogServiceUpsertRequest'
      responses:
        '201':
          description: Catalog service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCatalogServiceResource'
  /admin/catalog/services/{serviceId}:
    patch:
      tags: [Catalog]
      summary: Admin update catalog service
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCatalogServiceUpdateRequest'
      responses:
        '200':
          description: Catalog service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCatalogServiceResource'
  /admin/catalog/affiliate-settings:
    get:
      tags: [Catalog]
      summary: Admin catalog affiliate settings list
      description: |
        Admin-only list of catalog services focused on affiliate eligibility configuration.
        `affiliateCommissionPercent` uses human-readable percentage semantics such as
        `30.00 = 30%` and `12.50 = 12.5%`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: isAffiliateEnabled
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated admin catalog list with affiliate settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminCatalogServicesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /admin/catalog/{catalogServiceId}/affiliate-settings:
    patch:
      tags: [Catalog]
      summary: Admin update catalog affiliate settings
      description: |
        Updates affiliate eligibility for a catalog service.
        When `isAffiliateEnabled` is `true`, `affiliateCommissionPercent` is required and must
        be a positive percentage with up to 2 decimal places.
        When `isAffiliateEnabled` is `false`, the backend clears the stored percentage to `null`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CatalogServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCatalogAffiliateSettingsUpdateRequest'
      responses:
        '200':
          description: Updated admin catalog resource with affiliate settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCatalogServiceResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /admin/affiliates:
    get:
      tags: [Affiliates]
      summary: Admin affiliate profile list
      description: |
        Admin-only moderation list for `AffiliateProfile`.
        Affiliate is not a separate user role; it is a normal `User` with affiliate profile state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortOrder'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, suspended]
      responses:
        '200':
          description: Paginated admin affiliate profile list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAffiliateProfilesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /admin/affiliates/{affiliateProfileId}/approve:
    post:
      tags: [Affiliates]
      summary: Admin approve affiliate profile
      description: |
        Approves a pending affiliate profile.
        If the profile is already active, the current profile is returned.
        Suspended profiles cannot be approved directly and return conflict.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AffiliateProfileId'
      responses:
        '200':
          description: Affiliate profile after approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateProfileResource'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /admin/affiliates/{affiliateProfileId}/suspend:
    post:
      tags: [Affiliates]
      summary: Admin suspend affiliate profile
      description: |
        Suspends an affiliate profile.
        If the profile is already suspended, the current profile is returned unchanged.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AffiliateProfileId'
      responses:
        '200':
          description: Affiliate profile after suspension
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateProfileResource'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /admin/affiliate-commissions:
    get:
      tags: [Affiliates]
      summary: Admin affiliate commission list
      description: |
        Operational list of affiliate commissions.
        `userId` filters by the affiliate user, not the customer who placed the order.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortOrder'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, paid]
        - name: affiliateProfileId
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated affiliate commission list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminAffiliateCommissionsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /admin/affiliate-payouts:
    get:
      tags: [Affiliates]
      summary: Admin affiliate payout list
      description: |
        Operational list of affiliate payouts.
        `userId` filters by the affiliate user, not the admin who processed the payout.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortOrder'
        - name: status
          in: query
          schema:
            type: string
            enum: [requested, processing, paid, failed, cancelled]
        - name: affiliateProfileId
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated affiliate payout list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAffiliatePayoutsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Affiliates]
      summary: Admin create manual affiliate payout
      description: |
        Manual payout marks the selected `approved` affiliate commissions as `paid`
        and creates an `AffiliatePayout` record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateAffiliatePayoutRequest'
      responses:
        '201':
          description: Created affiliate payout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedAffiliatePayoutResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /admin/orders:
    get:
      tags: [Orders]
      summary: Admin order list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
