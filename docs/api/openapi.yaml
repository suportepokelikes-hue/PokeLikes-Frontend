components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
    SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
    CatalogServiceId:
      name: catalogServiceId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
    AffiliateProfileId:
      name: affiliateProfileId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InsufficientWalletBalanceError:
      description: Insufficient wallet balance
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          required: [code, message]
      required: [error]
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        phone:
          type: string
        referralCode:
          type: string
      required: [name, email, password, phone]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [email, password]
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]
    EmailVerificationConfirmRequest:
      type: object
      properties:
        token:
          type: string
      required: [token]
    EmailVerificationRequestResponse:
      type: object
      properties:
        status:
          type: string
          enum: [already_verified, verification_requested]
        expiresAt:
          type: string
          format: date-time
          nullable: true
        delivery:
          type: string
          enum: [email, preview]
        previewToken:
          type: string
      required: [status, expiresAt, delivery]
    AuthSessionResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
      required: [accessToken, refreshToken, user]
    UserSummary:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [customer, admin]
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          type: string
        referralCode:
          type: string
        emailVerified:
          type: boolean
      required: [id, role, name, email, status]
    AdminCreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        phone:
          type: string
        role:
          type: string
          enum: [customer, admin]
        status:
          type: string
          enum: [active, disabled]
      required: [name, email, password]
    AdminUpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
          format: password
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [customer, admin]
        status:
          type: string
          enum: [active, disabled]
    Money:
      type: object
      properties:
        amount:
          type: string
        currency:
          type: string
      required: [amount, currency]
    ReferralRewardRules:
      type: object
      properties:
        minimumTopupAmount:
          $ref: '#/components/schemas/Money'
        referredBonusAmount:
          $ref: '#/components/schemas/Money'
        referrerBonusAmount:
          $ref: '#/components/schemas/Money'
      required: [minimumTopupAmount, referredBonusAmount, referrerBonusAmount]
    ReferralOwnReward:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, rewarded, blocked]
        qualifyingPaymentId:
          type: string
          nullable: true
        qualifyingAmount:
          $ref: '#/components/schemas/Money'
        referredBonusAmount:
          $ref: '#/components/schemas/Money'
        processedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, status, qualifyingPaymentId, qualifyingAmount, referredBonusAmount, processedAt]
    ReferralProgramSummary:
      type: object
      properties:
        invitedUsers:
          type: integer
        rewardedUsers:
          type: integer
        earnedAmount:
          $ref: '#/components/schemas/Money'
      required: [invitedUsers, rewardedUsers, earnedAmount]
    ReferralSummaryResponse:
      type: object
      properties:
        referralCode:
          type: string
        referralLink:
          type: string
        emailVerified:
          type: boolean
        rewardRules:
          $ref: '#/components/schemas/ReferralRewardRules'
        rewardStatus:
          type: string
          enum: [not_referred, pending_email_verification, pending_first_qualifying_topup, rewarded]
        ownReferralReward:
          allOf:
            - $ref: '#/components/schemas/ReferralOwnReward'
          nullable: true
        summary:
          $ref: '#/components/schemas/ReferralProgramSummary'
      required: [referralCode, referralLink, emailVerified, rewardRules, rewardStatus, ownReferralReward, summary]
    AffiliateProfileResource:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, active, suspended]
        publicCode:
          type: string
        approvedAt:
          type: string
          format: date-time
          nullable: true
        suspendedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, status, publicCode, approvedAt, suspendedAt, createdAt, updatedAt]
    AdminAffiliateProfileResource:
      allOf:
        - $ref: '#/components/schemas/AffiliateProfileResource'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/UserReference'
          required: [user]
    AffiliateSummaryTotalsResource:
      type: object
      properties:
        commissionsPendingCount:
          type: integer
        commissionsApprovedCount:
          type: integer
        commissionsRejectedCount:
          type: integer
        commissionsPaidCount:
          type: integer
        commissionsPendingAmount:
          type: string
        commissionsApprovedAmount:
          type: string
        commissionsPaidAmount:
          type: string
        totalRevenueAttributed:
          type: string
      required:
        [commissionsPendingCount, commissionsApprovedCount, commissionsRejectedCount, commissionsPaidCount, commissionsPendingAmount, commissionsApprovedAmount, commissionsPaidAmount, totalRevenueAttributed]
    AffiliateSummaryResource:
      type: object
      properties:
        affiliateProfile:
          oneOf:
            - $ref: '#/components/schemas/AffiliateProfileResource'
            - type: 'null'
        totals:
          $ref: '#/components/schemas/AffiliateSummaryTotalsResource'
      required: [affiliateProfile, totals]
    AffiliateCommissionResource:
      type: object
      description: |
        Affiliate commissions are created as `pending`.
        The current implementation approves on order `completed`, rejects on order
        `failed` or `canceled`, and keeps `partial` as `pending`.
      properties:
        id:
          type: string
        orderId:
          type: string
        catalogServiceId:
          type: string
        publicPriceSnapshot:
          type: string
        supplierCostSnapshot:
          type: string
        grossMarginSnapshot:
          type: string
        commissionPercentSnapshot:
          type: string
          description: Human-readable percentage snapshot. `30.00` means `30%`.
        commissionAmount:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, paid]
        approvedAt:
          type: string
          format: date-time
          nullable: true
        rejectedAt:
          type: string
          format: date-time
          nullable: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        [id, orderId, catalogServiceId, publicPriceSnapshot, supplierCostSnapshot, grossMarginSnapshot, commissionPercentSnapshot, commissionAmount, status, approvedAt, rejectedAt, paidAt, createdAt]
    AdminAffiliateCommissionResource:
      allOf:
        - $ref: '#/components/schemas/AffiliateCommissionResource'
        - type: object
          properties:
            affiliateProfileId:
              type: string
            affiliate:
              type: object
              properties:
                userId:
                  type: string
                publicCode:
                  type: string
              required: [userId, publicCode]
          required: [affiliateProfileId, affiliate]
    AffiliatePayoutResource:
      type: object
      description: Manual admin payout record for affiliate commissions.
      properties:
        id:
          type: string
        affiliateProfileId:
          type: string
        amount:
          type: string
        status:
          type: string
          enum: [requested, processing, paid, failed, cancelled]
        processedByUserId:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true
        affiliate:
          type: object
          properties:
            userId:
              type: string
            publicCode:
              type: string
          required: [userId, publicCode]
      required:
        [id, affiliateProfileId, amount, status, processedByUserId, notes, createdAt, processedAt, affiliate]
    CreatedAffiliatePayoutResource:
      allOf:
        - $ref: '#/components/schemas/AffiliatePayoutResource'
        - type: object
          properties:
            commissionIds:
              type: array
              items:
                type: string
            commissionCount:
              type: integer
          required: [commissionIds, commissionCount]
    AdminCreateAffiliatePayoutRequest:
      type: object
      properties:
        affiliateProfileId:
          type: integer
          minimum: 1
        commissionIds:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 1
        notes:
          type: string
          nullable: true
      required: [affiliateProfileId, commissionIds]
    UserReference:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
      required: [id, name, email]
    WalletSummary:
      type: object
      properties:
        id:
          type: string
        availableBalance:
          $ref: '#/components/schemas/Money'
      required: [id, availableBalance]
    AdminWalletAdjustmentRequest:
      type: object
      properties:
        amount:
          type: string
        direction:
          type: string
          enum: [credit, debit]
        type:
          type: string
          enum: [wallet_adjustment_admin, wallet_reversal_admin]
        reason:
          type: string
      required: [amount, direction]
    AdminWalletAdjustmentResponse:
      type: object
      properties:
        wallet:
          $ref: '#/components/schemas/WalletSummary'
